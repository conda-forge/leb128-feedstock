{% set version = "1.0.9" %}

package:
  name: leb128
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/leb128/leb128-{{ version }}.tar.gz
  sha256: 8f8b0e2216ba8a318e2897360d9a34d88e2c968656fcb7c7bbb1aef31010f1c6

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - leb128
  commands:
    - pip check

about:
  home: https://github.com/mohanson/leb128
  summary: LEB128(Little Endian Base 128)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bollwyvl
